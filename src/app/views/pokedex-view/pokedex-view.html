@if (showUi()) {
  <div class="grid grid-cols-2 gap-3 p-20 pl-23 pr-23 pt-24">
    <!--Lista-->
    <app-pokemon-list-component
      [pokemonList]="pokemonList"
      (selectPokemon)="selectPokemon($event)">

    >
    </app-pokemon-list-component>

    <!-- panel informativo -->
    <app-pokemon-info-component
      [pokemonNameSelect]="pokemonNameSelect()"
    ></app-pokemon-info-component>
  </div>
}
